---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tg-s3-processor
spec:
  chartRef:
    kind: OCIRepository
    name: tg-s3-processor
  interval: 1h
  values:
    controllers:
      tg-s3-processor:
        type: deployment
        replicas: 2
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          # --- processor (gotd MTProto file gateway) ---
          # In the BotFleet DO architecture, the processor connects to the
          # global BotFleet Durable Object over WebSocket for bot/rate-limit
          # coordination. All pods load all bots; the DO replicates state.
          # Traffic reaches the processor via the shared cloudflare-tunnel
          # (single route tg-s3-processor.${SECRET_DOMAIN} -> k8s Service
          # round-robin). No per-pod tunnel sidecar or init container.
          app:
            image:
              repository: docker.io/jackus/tg-s3_processor
              tag: 0.4.2
              pullPolicy: Always
            env:
              PORT: &port 3000
              # PROCESSOR_ROUTE is the shared tunnel hostname the worker uses
              # to reach any processor pod. The processor sends it at
              # registration for backward compat but it is no longer
              # load-bearing — the worker independently knows this via its own
              # PROCESSOR_ROUTE var.
              PROCESSOR_ROUTE: "tg-s3-processor.${SECRET_DOMAIN}"
            envFrom:
              - secretRef:
                  name: tg-s3-processor-secret
            probes:
              # Liveness = "is the HTTP server alive?" Must NOT gate on bot
              # auth — that's a 2+ min boot and would look like a hang. /health
              # should return 200 the moment the server is listening.
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              # Readiness = "can this pod serve traffic?" Gates on bots being
              # authed via /ready, so the pod stays NotReady during boot without
              # getting killed.
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 500m
                memory: 256Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
    service:
      app:
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        endpoints:
          - port: http
