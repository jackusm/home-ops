---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tg-s3-processor
spec:
  chartRef:
    kind: OCIRepository
    name: tg-s3-processor
  interval: 1h
  values:
    controllers:
      tg-s3-processor:
        # DaemonSet: exactly one pod per schedulable node, by construction.
        # This is what we actually want — "1 pod on every node, never
        # co-located, auto-tracks node count" — with no replicas to tune and
        # no podAntiAffinity (a DaemonSet can't place two pods on one node).
        #
        # Update strategy is ignored for DaemonSets per app-template docs;
        # the cluster default (RollingUpdate, maxUnavailable: 1) updates one
        # node at a time, so on a 2-node cluster >= 1 pod stays up.
        #
        # NOTE on the prior Deployment attempt: app-template's rollingUpdate
        # block reads .surge / .unavailable (NOT .maxSurge / .maxUnavailable).
        # The k8s-native key names silently dropped the whole block, leaving
        # the default maxSurge:25% which surged a new pod before any old pod
        # was killed -> hard anti-affinity deadlock on a 2-node cluster.
        type: daemonset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          # --- processor (gotd MTProto file gateway) ---
          # In the BotFleet DO architecture, the processor connects to the
          # global BotFleet Durable Object over WebSocket for bot/rate-limit
          # coordination. All pods load all bots; the DO replicates state.
          # Traffic reaches the processor via the shared cloudflare-tunnel
          # (single route tg-s3-processor.${SECRET_DOMAIN} -> k8s Service
          # round-robin). No per-pod tunnel sidecar or init container.
          app:
            image:
              repository: docker.io/jackus/tg-s3_processor
              tag: 0.5.6
              pullPolicy: Always
            env:
              PORT: &port 3000
              # PROCESSOR_ROUTE is the shared tunnel hostname the worker uses
              # to reach any processor pod. The processor sends it at
              # registration for backward compat but it is no longer
              # load-bearing — the worker independently knows this via its own
              # PROCESSOR_ROUTE var.
              PROCESSOR_ROUTE: "tg-s3-processor.${SECRET_DOMAIN}"
            envFrom:
              - secretRef:
                  name: tg-s3-processor-secret
            probes:
              # Liveness = "is the HTTP server alive?" Must NOT gate on bot
              # auth — that's a 2+ min boot and would look like a hang. /health
              # should return 200 the moment the server is listening.
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              # Readiness = "can this pod serve traffic?" Gates on bots being
              # authed via /ready, so the pod stays NotReady during boot without
              # getting killed.
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      # No podAntiAffinity needed: a DaemonSet places exactly one pod per
      # node, so co-location is structurally impossible. DaemonSets also
      # won't land on NoSchedule-tainted control-plane nodes unless we add
      # tolerations, matching the old Deployment's scheduling surface.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
    service:
      app:
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        endpoints:
          - port: http
